<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Document</title>
</head>

<body>
    <main>
        <header id="today_header">
            <h3>QUARTA-FEIRA, 8 DE JULHO DE 2026</h3>
            <span id="today_logomarca">Today</span>
        </header>

        <section id="prioridade_do_dia_section">
            <header>
                <h1>Qual é a sua prioridade de hoje?</h1>
                <h2>Apenas uma. A que realmente importa.</h2>
            </header>

            <div id="prioridade_do_dia_container">
                <input placeholder="Escreva aqui..." id="prioridade_do_dia" oninput="contarCaracteres() ; atualizarBotaoPrioriade()"></input>
                <span id="progresso_blockquote">0/120</span>
            </div>
        </section>

        <button id="definir_prioridade">Definir prioridade</button>
    </main>

    <script>
        window.onload = function () {
            atualizarData();
        }

        function atualizarData() {
            const diasSemana = ['Domingo', 'Segunda-Feira', 'Terça-Feira', 'Quarta-Feira', 'Quinta-Feira', 'Sexta-Feira', 'Sábado']
            const mesesAno = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro']

            const data = new Date();

            const diaSemana = data.getDay();
            const dia = data.getDate();
            const mes = data.getMonth();
            const ano = data.getFullYear();

            const dataCompleta = `${diasSemana[diaSemana]}, ${dia} de ${mesesAno[mes]} de ${ano}`;

            const elementoData = document.querySelector('#today_header h3');
            elementoData.innerHTML = dataCompleta;
        }

        function contarCaracteres() {
            const elementoInput = document.querySelector('#prioridade_do_dia');
            const elementoContador = document.querySelector('#progresso_blockquote');

            const quantidadeCaracteres = elementoInput.value.length;

            elementoContador.innerHTML = `${quantidadeCaracteres} / 120`;

            if (quantidadeCaracteres > 120 && elementoInput === document.activeElement) {
                elementoContador.style.color = 'red';
            } else if (quantidadeCaracteres <= 120 && quantidadeCaracteres > 0 && elementoInput === document.activeElement) {
                elementoContador.style.color = 'green';
            } else {
                elementoContador.style.color = '#a8a075';
            }
        }

        function atualizarBotaoPrioriade() {
            const elementoInput = document.querySelector('#prioridade_do_dia');
            const elementoBotao = document.querySelector('#definir_prioridade');

            if (elementoInput === document.activeElement) {
                elementoBotao.style.backgroundColor = '#0274c0';
                elementoBotao.style.color = '#FFFFFF';
                elementoBotao.style.cursor = 'pointer';
            } else {
                elementoBotao.style.backgroundColor = '#242728';
                elementoBotao.style.color = '#a8a075';
                elementoBotao.style.cursor = 'not-allowed';
            }
        }
    </script>
</body>

</html>
